<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">K-Swing Sentinel 라이브 아키텍처 흐름</title>
  <desc id="desc">원시 payload와 수치 피처가 벡터화, temporal prediction, 실행, 감사로 이어지는 라이브 아키텍처 흐름도.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#eef5f3"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6faf9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#2f4f4f"/>
    </marker>
    <marker id="arrowSoft" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#6b7280"/>
    </marker>
    <style>
      .title { font: 700 34px "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #18312b; }
      .subtitle { font: 400 15px "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #415a56; }
      .section { font: 700 20px "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #1f4038; }
      .box-title { font: 700 17px "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #102823; }
      .box-body { font: 400 12px "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #324b46; }
      .small { font: 400 11px "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #4d625e; }
      .edge { stroke: #2f4f4f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#arrowSoft); }
      .edge-dash { stroke: #6b7280; stroke-width: 2.5; fill: none; stroke-dasharray: 9 7; marker-end: url(#arrowSoft); }
      .panel { fill: url(#panel); stroke: #d7e1de; stroke-width: 2; rx: 28; }
      .input { fill: #fff8e7; stroke: #dfc27d; stroke-width: 2.5; rx: 22; }
      .process { fill: #edf7f4; stroke: #7ab29b; stroke-width: 2.5; rx: 22; }
      .predict { fill: #eef3fb; stroke: #8ba8d8; stroke-width: 2.5; rx: 22; }
      .decision { fill: #fdf0ea; stroke: #d9a283; stroke-width: 2.5; rx: 22; }
      .note { fill: #f6f7f8; stroke: #cfd5db; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1040" fill="url(#bg)"/>

  <text x="80" y="72" class="title">K-Swing Sentinel 라이브 아키텍처</text>
  <text x="80" y="98" class="subtitle">직접 텍스트 벡터화, temporal 상태 인코딩, self-attention 컨텍스트,</text>
  <text x="80" y="118" class="subtitle">causal attention 예측, 보수적 실행으로 이어지는 흐름입니다.</text>

  <rect x="60" y="140" width="400" height="810" class="panel"/>
  <rect x="500" y="140" width="420" height="810" class="panel"/>
  <rect x="960" y="140" width="280" height="810" class="panel"/>
  <rect x="1280" y="140" width="260" height="810" class="panel"/>

  <text x="90" y="182" class="section">1. 입력과 수집</text>
  <text x="530" y="182" class="section">2. 텍스트와 상태 인코딩</text>
  <text x="990" y="182" class="section">3. 예측</text>
  <text x="1310" y="182" class="section">4. 실행과 안전장치</text>

  <rect x="90" y="220" width="340" height="105" class="input"/>
  <text x="115" y="255" class="box-title">원시 이벤트 payload</text>
  <text x="115" y="282" class="box-body">headline, body, text, summary, source_doc_ids,</text>
  <text x="115" y="304" class="box-body">cluster_ids, 선택적 event_score</text>

  <rect x="90" y="360" width="340" height="120" class="input"/>
  <text x="115" y="395" class="box-title">수치 피처</text>
  <text x="115" y="422" class="box-body">flow_strength, trend_120m, extension_60m,</text>
  <text x="115" y="444" class="box-body">시장 컨텍스트, 거래량, 가격, 기타 지표</text>

  <rect x="90" y="515" width="340" height="120" class="input"/>
  <text x="115" y="550" class="box-title">과거 상태 시퀀스</text>
  <text x="115" y="577" class="box-body">학습 또는 라이브 추론용 이전 timestep 상태</text>
  <text x="115" y="599" class="box-body">각 step은 numeric_features와 vector를 포함 가능</text>

  <rect x="90" y="670" width="340" height="110" class="note"/>
  <text x="115" y="705" class="box-title">선택 분기</text>
  <text x="115" y="732" class="box-body">LLM 정규화는 오프라인/실험 경로에서는 가능하지만,</text>
  <text x="115" y="754" class="box-body">기본 경로는 아닙니다</text>

  <rect x="90" y="815" width="340" height="95" class="note"/>
  <text x="115" y="850" class="box-title">런타임 메타데이터</text>
  <text x="115" y="877" class="box-body">as_of_time, session_type, venue eligibility, price,</text>
  <text x="115" y="899" class="box-body">dependency state</text>

  <rect x="530" y="220" width="360" height="110" class="process"/>
  <text x="555" y="255" class="box-title">직접 텍스트 추출</text>
  <text x="555" y="282" class="box-body">LiveInferenceService가</text>
  <text x="555" y="302" class="box-body">headline/body/text/summary를 raw text로 결합</text>

  <rect x="530" y="365" width="360" height="110" class="process"/>
  <text x="555" y="400" class="box-title">문장 단위 벡터화</text>
  <text x="555" y="427" class="box-body">문장 분리 -> 각 문장을 RoBERTa 인코딩</text>
  <text x="555" y="449" class="box-body">-> hierarchical transformer 집계</text>

  <rect x="530" y="510" width="360" height="115" class="process"/>
  <text x="555" y="545" class="box-title">벡터 payload</text>
  <text x="555" y="572" class="box-body">z_event (64), z_social (32), z_macro (16)</text>
  <text x="555" y="592" class="box-body">metadata: encoder, aggregator,</text>
  <text x="555" y="612" class="box-body">as_of_time, session_type</text>

  <rect x="530" y="660" width="360" height="140" class="process"/>
  <text x="555" y="695" class="box-title">temporal 상태 빌더</text>
  <text x="555" y="722" class="box-body">numeric_features + vector_payload를 결합해</text>
  <text x="555" y="744" class="box-body">state_sequence row를 만들고, 필요 시 최신 vector를</text>
  <text x="555" y="766" class="box-body">마지막 timestep에 주입합니다.</text>

  <rect x="530" y="835" width="360" height="75" class="note"/>
  <text x="555" y="868" class="box-title">다음 개선</text>
  <text x="555" y="892" class="box-body">time embedding: minute_of_session, day_of_week, session_type</text>

  <rect x="990" y="235" width="220" height="95" class="predict"/>
  <text x="1015" y="270" class="box-title">timestep 임베딩</text>
  <text x="1015" y="297" class="box-body">수치 + vector feature 위 2-layer MLP</text>

  <rect x="990" y="370" width="220" height="95" class="predict"/>
  <text x="1015" y="405" class="box-title">self-attention 컨텍스트</text>
  <text x="1015" y="432" class="box-body">양방향 컨텍스트 블록</text>

  <rect x="990" y="505" width="220" height="95" class="predict"/>
  <text x="1015" y="540" class="box-title">causal attention</text>
  <text x="1015" y="567" class="box-body">시퀀스 위 GPT식 masked block</text>

  <rect x="990" y="640" width="220" height="145" class="predict"/>
  <text x="1015" y="675" class="box-title">예측 헤드</text>
  <text x="1015" y="702" class="box-body">er_20d, dd_20d, p_up_20d,</text>
  <text x="1015" y="724" class="box-body">uncertainty, flow_persist, regime</text>
  <text x="1015" y="746" class="box-body">calibration 및 FusedPrediction 출력</text>

  <rect x="1310" y="235" width="200" height="110" class="decision"/>
  <text x="1335" y="270" class="box-title">의사결정 엔진</text>
  <text x="1335" y="297" class="box-body">BUY, WAIT_PULLBACK,</text>
  <text x="1335" y="319" class="box-body">NO_TRADE, SELL...</text>

  <rect x="1310" y="390" width="200" height="110" class="decision"/>
  <text x="1335" y="425" class="box-title">실행 매핑</text>
  <text x="1335" y="452" class="box-body">KRX/NXT, session-aware,</text>
  <text x="1335" y="474" class="box-body">venue-aware routing</text>

  <rect x="1310" y="545" width="200" height="130" class="decision"/>
  <text x="1335" y="580" class="box-title">프로덕션 런타임</text>
  <text x="1335" y="607" class="box-body">readiness gate, semantic refresh,</text>
  <text x="1335" y="627" class="box-body">retry/backoff, circuit breaker,</text>
  <text x="1335" y="647" class="box-body">dead-letter log, kill switch</text>

  <rect x="1310" y="710" width="200" height="125" class="decision"/>
  <text x="1335" y="745" class="box-title">감사 및 모니터링</text>
  <text x="1335" y="772" class="box-body">model version, vectorizer version,</text>
  <text x="1335" y="794" class="box-body">source docs, rationale code, metrics</text>

  <path d="M430 272 L530 272" class="edge"/>
  <path d="M710 330 L710 365" class="edge"/>
  <path d="M710 475 L710 510" class="edge"/>
  <path d="M710 625 L710 660" class="edge"/>
  <path d="M890 730 L990 730" class="edge"/>

  <path d="M430 420 C470 420, 470 710, 530 710" class="edge"/>
  <path d="M430 575 C470 575, 470 730, 530 730" class="edge"/>
  <path d="M430 862 C470 862, 470 760, 530 760" class="edge-soft"/>

  <path d="M1210 282 L1310 282" class="edge"/>
  <path d="M1210 417 L1210 445 L1310 445" class="edge"/>
  <path d="M1210 552 L1210 600 L1310 600" class="edge"/>
  <path d="M1410 345 L1410 390" class="edge"/>
  <path d="M1410 500 L1410 545" class="edge"/>
  <path d="M1410 665 L1410 710" class="edge"/>

  <path d="M430 725 C480 725, 480 285, 530 285" class="edge-dash"/>
  <text x="446" y="706" class="small">선택 사항</text>

  <path d="M820 835 C900 835, 930 835, 990 785" class="edge-dash"/>
  <text x="832" y="823" class="small">계획된 time feature</text>

  <rect x="1025" y="868" width="485" height="58" class="note"/>
  <text x="1047" y="891" class="small">현재 기본 live 경로: 원시 payload -&gt; 직접 벡터화 -&gt;</text>
  <text x="1047" y="911" class="small">state_sequence -&gt; temporal predictor -&gt; 의사결정/실행</text>
</svg>
