[search]
provider = "internal_context_only"
max_results = 5

[llm]
provider = "openrouter_single"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
prompt_version = "normalizer_prompt_v2"
app_name = "K-Swing Sentinel"
referer = "https://local.kswing-sentinel"
model = "x-ai/grok-4.1-fast"

[encoder]
backend = "auto"
model_id = "snunlp/KR-SBERT-V40K-klueNLI-augSTS"
device = "cpu"
max_length = 256
